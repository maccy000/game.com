<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50/50 サバイバル</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-color: #ffffff;
            --primary-color: #4a90e2;
            --accent-color: #e74c3c;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .container {
            background: var(--card-color);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        h1 { margin-bottom: 0.5rem; }
        .score-board { font-size: 1.2rem; margin-bottom: 1.5rem; color: #666; }
        .current-streak { font-size: 3rem; font-weight: bold; color: var(--primary-color); margin: 1rem 0; }

        .btn-group { display: flex; gap: 10px; justify-content: center; }

        button {
            padding: 15px 30px;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: transform 0.1s, background 0.2s;
            font-weight: bold;
        }

        .choice-btn { background: var(--primary-color); color: white; flex: 1; }
        .choice-btn:hover { background: #357abd; }
        .choice-btn:active { transform: scale(0.95); }

        .reset-btn { background: var(--accent-color); color: white; display: none; width: 100%; }

        .result-msg { margin-top: 1.5rem; line-height: 1.6; min-height: 4em; }
        .probability { font-weight: bold; color: #d35400; }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h1>50/50 Survival</h1>
    <div class="score-board">連続成功回数</div>
    <div id="streak" class="current-streak">0</div>

    <div id="game-ui">
        <p>どちらかのドアを選べ！</p>
        <div class="btn-group">
            <button class="choice-btn" onclick="play(0)">左のドア</button>
            <button class="choice-btn" onclick="play(1)">右のドア</button>
        </div>
    </div>

    <div id="result-ui" class="result-msg"></div>
    <button id="reset-btn" class="reset-btn" onclick="resetGame()">もう一度挑戦する</button>
</div>

<script>
    let streak = 0;

    function play(choice) {
        const winningDoor = Math.floor(Math.random() * 2);
        const streakDisplay = document.getElementById('streak');
        const resultUI = document.getElementById('result-ui');
        const gameUI = document.getElementById('game-ui');
        const resetBtn = document.getElementById('reset-btn');

        if (choice === winningDoor) {
            // 正解
            streak++;
            streakDisplay.innerText = streak;
            resultUI.innerHTML = `<span style="color: #27ae60;">セーフ！次へ進もう。</span>`;
            resultUI.classList.add('fade-in');
            setTimeout(() => resultUI.classList.remove('fade-in'), 500);
        } else {
            // 終了
            const probability = Math.pow(0.5, streak) * 100;
            const comparison = getComparison(streak);
            
            gameUI.style.display = 'none';
            resetBtn.style.display = 'block';
            
            resultUI.innerHTML = `
                <div class="fade-in">
                    <b style="color: var(--accent-color); font-size: 1.2rem;">GAME OVER</b><br>
                    ここまで到達する確率は <span class="probability">${probability.toFixed(streak > 10 ? 6 : 2)}%</span> でした。<br>
                    <small>${comparison}</small>
                </div>
            `;
        }
    }

    function getComparison(n) {
        if (n === 0) return "まだ何も始めていません。";
        if (n <= 3) return "よくあることです。";
        if (n <= 5) return "なかなかの運の持ち主ですね。";
        if (n <= 7) return "1クラス(32人)に1人の逸材です。";
        if (n <= 10) return "1000人に1人の強運です！";
        if (n <= 14) return "万人に1人のレベル。宝くじを買うべき？";
        if (n <= 20) return "100万人に1人の奇跡。歴史に刻まれます。";
        return "もはや計算不能な神の領域です。";
    }

    function resetGame() {
        streak = 0;
        document.getElementById('streak').innerText = "0";
        document.getElementById('game-ui').style.display = 'block';
        document.getElementById('reset-btn').style.display = 'none';
        document.getElementById('result-ui').innerHTML = "";
    }
</script>

</body>
</html>
