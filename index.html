<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>左右当てゲーム</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f5f5f5;
    }
    #game {
      margin-top: 40px;
    }
    .box-container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-top: 30px;
    }
    .box {
      width: 120px;
      height: 120px;
      background: #fff;
      border: 3px solid #333;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 48px;
      cursor: pointer;
      border-radius: 10px;
      user-select: none;
    }
    #scoreboard {
      position: absolute;
      right: 20px;
      top: 20px;
      text-align: right;
      font-size: 18px;
    }
    #result {
      font-size: 28px;
      margin-top: 20px;
      height: 40px;
    }
  </style>
</head>
<body>
  <div id="scoreboard">
    <div>ハイスコア: <span id="highScore">0</span></div>
    <div>更新日時: <span id="updatedAt">---</span></div>
  </div>

  <h1>左右当てゲーム</h1>

  <div>
    名前：<input id="playerName" type="text" placeholder="名前を入力" />
    <button onclick="startGame()">ゲーム開始</button>
  </div>

  <div id="game" style="display:none;">
    <div class="box-container">
      <div class="box" id="leftBox" onclick="choose('left')">?</div>
      <div class="box" id="rightBox" onclick="choose('right')">?</div>
    </div>

    <div id="result"></div>
    <h2>連続成功数: <span id="score">0</span></h2>
  </div>

  <div id="rank">
    <h2>オンラインランキング（上位5）</h2>
    <ol id="rankingList"></ol>
  </div>

  <script>
    let correctSide;
    let score = 0;
    let playerName = "";

    // ハイスコア管理
    let highScore = Number(localStorage.getItem("highScore")) || 0;
    let updatedAt = localStorage.getItem("updatedAt") || "---";
    document.getElementById("highScore").textContent = highScore;
    document.getElementById("updatedAt").textContent = updatedAt;

    // 仮のオンラインランキング（実際はローカル保存）
    let onlineRanking = JSON.parse(localStorage.getItem("onlineRanking")) || [];

    function startGame() {
      playerName = document.getElementById("playerName").value;
      if (!playerName) {
        alert("名前を入力してください！");
        return;
      }
      score = 0;
      document.getElementById("score").textContent = score;
      document.getElementById("game").style.display = "block";
      newRound();
    }

    function newRound() {
      // ◯ の表示リセット
      document.getElementById("leftBox").textContent = "?";
      document.getElementById("rightBox").textContent = "?";
      document.getElementById("result").textContent = "";

      // 新しい正解をランダムで設定
      correctSide = Math.random() < 0.5 ? "left" : "right";
    }

    function choose(side) {
      if (side === correctSide) {
        // 正解
        document.getElementById("result").textContent = "正解！";
        score++;
        document.getElementById("score").textContent = score;

        // 正解側にだけ ◯ を出す
        if (side === "left") {
          document.getElementById("leftBox").textContent = "◯";
        } else {
          document.getElementById("rightBox").textContent = "◯";
        }

        updateHighScore();
        setTimeout(newRound, 800);
      } else {
        // 間違い → 連続成功数をゼロに戻す
        document.getElementById("result").textContent = "失敗…";
        score = 0;
        document.getElementById("score").textContent = score;

        endGame();
      }
    }

    function updateHighScore() {
      if (score > highScore) {
        highScore = score;
        let now = new Date().toLocaleString();
        updatedAt = now;

        document.getElementById("highScore").textContent = highScore;
        document.getElementById("updatedAt").textContent = updatedAt;

        localStorage.setItem("highScore", highScore);
        localStorage.setItem("updatedAt", updatedAt);
      }
    }

    function endGame() {
      saveOnlineRanking();
      renderRanking();
    }

    function saveOnlineRanking() {
      onlineRanking.push({ name: playerName, score: highScore });
      onlineRanking.sort((a, b) => b.score - a.score);
      onlineRanking = onlineRanking.slice(0, 5); // 上位5人だけ
      localStorage.setItem("onlineRanking", JSON.stringify(onlineRanking));
    }

    function renderRanking() {
      const list = document.getElementById("rankingList");
      list.innerHTML = "";
      onlineRanking.forEach((entry) => {
        const li = document.createElement("li");
        li.textContent = `${entry.name}: ${entry.score}`;
        list.appendChild(li);
      });
    }

    renderRanking();
  </script>
</body>
</html>
