<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>2分の1チャレンジ</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  text-align: center;
}

/* ハイスコア */
#highScoreBox {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(10px);
  text-align: right;
  font-size: 14px;
}

/* メイン */
.container {
  margin-top: 120px;
}

h1 {
  font-size: 40px;
}

.box-area {
  display: flex;
  justify-content: center;
  gap: 50px;
  margin-top: 40px;
}

/* 箱 */
.box {
  width: 120px;
  height: 120px;
  background: linear-gradient(145deg, #444, #222);
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0 6px 20px rgba(0,0,0,0.4);
}

.box:hover {
  transform: scale(1.1);
}

/* 結果表示 */
.result {
  margin-top: 30px;
  font-size: 22px;
}

.prob {
  margin-top: 10px;
  color: #aee7ff;
}

/* エフェクト */
.success {
  background: linear-gradient(145deg, gold, orange);
}

.fail {
  background: linear-gradient(145deg, #ff4e50, #8b0000);
}
</style>

</head>
<body>

<div id="highScoreBox">
  🏆 <span id="highScore">0</span><br>
  更新: <span id="updateTime">なし</span>
</div>

<div class="container">
  <h1>2分の1チャレンジ</h1>
  <p>どちらかにお金が入っている…！</p>

  <div class="box-area">
    <div class="box" onclick="chooseBox(0)">?</div>
    <div class="box" onclick="chooseBox(1)">?</div>
  </div>

  <div class="result" id="result">成功回数: 0</div>
  <div class="prob" id="probability">確率: 100%</div>
</div>

<script>
let successCount = 0;
let gameOver = false;

// ハイスコア読み込み
window.onload = function() {
  let s = localStorage.getItem("highScore");
  let t = localStorage.getItem("highScoreTime");

  if (s) {
    document.getElementById("highScore").textContent = s;
    document.getElementById("updateTime").textContent = t;
  }
};

function chooseBox(choice) {
  if (gameOver) {
    resetGame();
    return;
  }

  let correct = Math.random() < 0.5 ? 0 : 1;
  let boxes = document.querySelectorAll(".box");

  // 全リセット
  boxes.forEach(b => {
    b.classList.remove("success", "fail");
    b.textContent = "?";
  });

  if (choice === correct) {
    // 成功
    successCount++;
    boxes[choice].classList.add("success");
    boxes[choice].textContent = "💰";
  } else {
    // 失敗
    gameOver = true;
    boxes[choice].classList.add("fail");
    boxes[choice].textContent = "❌";
    boxes[correct].classList.add("success");
    boxes[correct].textContent = "💰";
    checkHighScore();
  }

  updateDisplay();
}

function updateDisplay() {
  document.getElementById("result").textContent =
    "成功回数: " + successCount;

  let probability = Math.pow(0.5, successCount);
  let percent = (probability * 100).toFixed(8);

  document.getElementById("probability").textContent =
    "ここまで成功する確率: " + percent + "%";

  if (gameOver) {
    document.getElementById("result").textContent += "（ゲームオーバー：クリックでリスタート）";
  }
}

// リセット
function resetGame() {
  successCount = 0;
  gameOver = false;
  document.querySelectorAll(".box").forEach(b => {
    b.classList.remove("success", "fail");
    b.textContent = "?";
  });
  updateDisplay();
}

// ハイスコア
function checkHighScore() {
  let high = localStorage.getItem("highScore") || 0;

  if (successCount > high) {
    let now = new Date();
    let t = now.toLocaleString();

    localStorage.setItem("highScore", successCount);
    localStorage.setItem("highScoreTime", t);

    document.getElementById("highScore").textContent = successCount;
    document.getElementById("updateTime").textContent = t;
  }
}
</script>

</body>
</html>
